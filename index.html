function renderSubPanelDoorRow(pid, spid, d, i) {
  const sel = (arr, val) => arr.map(t => `<option ${val===t?'selected':''}>${t}</option>`).join('');
  const statusClass = STATUS_CLASS[d.status] ? `status-${STATUS_CLASS[d.status]}` : '';
  const statusOpts = DOOR_STATUSES.map(s => `<option ${d.status===s?'selected':''}>${s}</option>`).join('');
  const dpsClass  = d.dps === 'Supervised' ? 'sup-supervised' : '';
  const rteClass  = d.rte === 'Supervised' ? 'sup-supervised' : '';
  return `<tr id="door_${d.id}">
    <td style="text-align:center;color:var(--muted);font-weight:700;width:26px;">${i+1}</td>
    <td><select class="status-select ${statusClass}" onchange="updateSubPanelDoor('${pid}','${spid}','${d.id}','status',this.value);this.className='status-select'+(this.value?' status-'+this.value.toLowerCase():'')">
      <option value="">—</option>${statusOpts}</select></td>
    <td><input type="text" value="${esc(d.name)}" placeholder="Door name" oninput="updateSubPanelDoor('${pid}','${spid}','${d.id}','name',this.value)" style="min-width:110px;" /></td>
    <td><input type="text" value="${esc(d.location)}" placeholder="Zone / floor" oninput="updateSubPanelDoor('${pid}','${spid}','${d.id}','location',this.value)" style="min-width:80px;" /></td>
    <td><select onchange="updateSubPanelDoor('${pid}','${spid}','${d.id}','doorType',this.value)"><option value="">—</option>${sel(DOOR_TYPES,d.doorType)}</select></td>
    <td><select onchange="updateSubPanelDoor('${pid}','${spid}','${d.id}','lockType',this.value)"><option value="">—</option>${sel(DOOR_LOCK_TYPES,d.lockType)}</select></td>
    <td><select onchange="updateSubPanelDoor('${pid}','${spid}','${d.id}','readerIn',this.value)" style="min-width:100px;"><option value="">—</option>${sel(READER_TYPES,d.readerIn)}</select></td>
    <td><input type="text" value="${esc(d.readerInAddr)}" placeholder="Port/Addr" oninput="updateSubPanelDoor('${pid}','${spid}','${d.id}','readerInAddr',this.value)" style="min-width:60px;" /></td>
    <td><select onchange="updateSubPanelDoor('${pid}','${spid}','${d.id}','rex',this.value)"><option value="">—</option>${sel(REX_TYPES,d.rex)}</select></td>
    <td><select class="sup-select ${dpsClass}" onchange="updateSubPanelDoor('${pid}','${spid}','${d.id}','dps',this.value);this.className='sup-select'+(this.value==='Supervised'?' sup-supervised':'')">
      <option value="">—</option>${sel(SUP_OPTIONS,d.dps)}</select></td>
    <td><select class="sup-select ${rteClass}" onchange="updateSubPanelDoor('${pid}','${spid}','${d.id}','rte',this.value);this.className='sup-select'+(this.value==='Supervised'?' sup-supervised':'')">
      <option value="">—</option>${sel(SUP_OPTIONS,d.rte)}</select></td>
    <td><input type="text" value="${esc(d.notes)}" placeholder="Notes" oninput="updateSubPanelDoor('${pid}','${spid}','${d.id}','notes',this.value)" style="min-width:80px;" /></td>
    <td style="white-space:nowrap;">
      <button class="btn btn-icon btn-sm" onclick="duplicateSubPanelDoor('${pid}','${spid}','${d.id}')" title="Duplicate" style="margin-right:3px;">${IC.copy}</button>
      <button class="btn btn-danger btn-sm btn-icon" onclick="removeSubPanelDoor('${pid}','${spid}','${d.id}')" title="Remove">${IC.x}</button>
    </td>
  </tr>`;
}

function renderIOBoard(pid, io, ioi) {
  const points = io.points || [];
  const inputs  = points.filter(pt => pt.kind === 'Input').length;
  const outputs = points.filter(pt => pt.kind === 'Output').length;
  const summary = points.length
    ? `${inputs ? `<span style="color:#34d399;font-weight:700;font-size:11px;">${inputs}×IN</span>` : ''}${inputs&&outputs?' ':''}${outputs ? `<span style="color:#fb923c;font-weight:700;font-size:11px;">${outputs}×OUT</span>` : ''}`
    : `<span style="color:var(--muted);font-size:11px;">0 points</span>`;
  return `
  <div class="ioboard-card" id="ioboard_${io.id}">
    <div class="ioboard-header">
      <span style="color:#10b981;display:flex;flex-shrink:0;">${IC.activity}</span>
      <input class="ioboard-name-input" value="${esc(io.name)}" placeholder="I/O Board Name / Label" oninput="updateIOBoard('${pid}','${io.id}','name',this.value)" />
      <span>${summary}</span>
      <button class="btn btn-icon btn-sm" title="Duplicate I/O board" onclick="duplicateIOBoard('${pid}','${io.id}')">${IC.copy}</button>
      <button class="btn btn-danger btn-sm btn-icon" onclick="removeIOBoard('${pid}','${io.id}')">${IC.x}</button>
    </div>
    <div class="ioboard-body">
      <div class="ioboard-meta">
        <div class="meta-field"><label>Model / Type</label><input type="text" value="${esc(io.model)}" placeholder="e.g. LNL-2220, RM-4" oninput="updateIOBoard('${pid}','${io.id}','model',this.value)" /></div>
        <div class="meta-field"><label>Physical Location</label><input type="text" value="${esc(io.location)}" placeholder="e.g. Elevator shaft, MDF" oninput="updateIOBoard('${pid}','${io.id}','location',this.value)" /></div>
        <div class="meta-field" style="max-width:150px;"><label>Address</label><input type="text" value="${esc(io.address)}" placeholder="e.g. 4" oninput="updateIOBoard('${pid}','${io.id}','address',this.value)" /></div>
        <div class="meta-field"><label>Notes</label><input type="text" value="${esc(io.notes)}" placeholder="Optional" oninput="updateIOBoard('${pid}','${io.id}','notes',this.value)" /></div>
      </div>
      <div class="doors-table-wrap">
        <table>
          <thead><tr>
            <th style="width:46px;">Pt #</th><th>Kind</th><th>Label</th><th>Type</th><th>Function / Use</th><th>Notes</th><th></th>
          </tr></thead>
          <tbody>${points.map((pt,i) => renderPointRow(pid,io.id,pt,i)).join('')}</tbody>
          <tfoot><tr class="add-row"><td colspan="7">
            <button class="btn btn-secondary btn-sm" onclick="addPoint('${pid}','${io.id}')">${IC.plus}<span style="margin-left:5px;">Add Point</span></button>
          </td></tr></tfoot>
        </table>
      </div>
    </div>
  </div>`;
}

function renderPointRow(pid, ioid, pt, i) {
  const kindClass = pt.kind === 'Input' ? 'io-kind-input' : pt.kind === 'Output' ? 'io-kind-output' : '';
  const typeOpts = pt.kind === 'Input'
    ? IO_INPUT_TYPES.map(t  => `<option ${pt.type===t?'selected':''}>${t}</option>`).join('')
    : pt.kind === 'Output'
    ? IO_OUTPUT_TYPES.map(t => `<option ${pt.type===t?'selected':''}>${t}</option>`).join('')
    : '';
  return `<tr id="point_${pt.id}">
    <td><input class="pt-num-input" type="number" min="1" value="${pt.ptNum||i+1}" oninput="updatePoint('${pid}','${ioid}','${pt.id}','ptNum',parseInt(this.value)||1)" /></td>
    <td><select class="${kindClass}" onchange="updatePoint('${pid}','${ioid}','${pt.id}','kind',this.value)">
      <option value="">—</option>${IO_POINT_KINDS.map(k=>`<option ${pt.kind===k?'selected':''}>${k}</option>`).join('')}</select></td>
    <td><input type="text" value="${esc(pt.label)}" placeholder="Label" oninput="updatePoint('${pid}','${ioid}','${pt.id}','label',this.value)" style="min-width:110px;" /></td>
    <td><select onchange="updatePoint('${pid}','${ioid}','${pt.id}','type',this.value)">
      <option value="">—</option>${typeOpts}</select></td>
    <td><input type="text" value="${esc(pt.func)}" placeholder="e.g. Elevator Floor, Gate Relay, Alarm Shunt…" oninput="updatePoint('${pid}','${ioid}','${pt.id}','func',this.value)" style="min-width:170px;" /></td>
    <td><input type="text" value="${esc(pt.notes)}" placeholder="Notes" oninput="updatePoint('${pid}','${ioid}','${pt.id}','notes',this.value)" style="min-width:80px;" /></td>
    <td style="white-space:nowrap;">
      <button class="btn btn-icon btn-sm" onclick="duplicatePoint('${pid}','${ioid}','${pt.id}')" title="Duplicate" style="margin-right:3px;">${IC.copy}</button>
      <button class="btn btn-danger btn-sm btn-icon" onclick="removePoint('${pid}','${ioid}','${pt.id}')" title="Remove">${IC.x}</button>
    </td>
  </tr>`;
}

// ── Update helpers ────────────────────────────────────────────────────────
function updatePanel(pid, field, value) {
  const p = panels.find(p => p.id === pid);
  if (p) p[field] = value;
  renderOutput(); syncURL();
}
function updateDoor(pid, did, field, value) {
  const p = panels.find(p => p.id === pid);
  if (!p) return;
  const d = p.doors.find(d => d.id === did);
  if (d) d[field] = value;
  const chips = document.querySelector(`#panel_${pid} .panel-progress`);
  if (chips) chips.innerHTML = panelProgressChips(p);
  const bar = document.querySelector(`#panel_${pid} .status-bar-wrap`);
  if (bar) bar.outerHTML = statusBarHTML(p);
  renderOutput(); syncURL();
}

function updateSubPanel(pid, spid, field, value) {
  const panel = panels.find(p => p.id === pid);
  if (!panel) return;
  const sp = (panel.subpanels||[]).find(s => s.id === spid);
  if (sp) sp[field] = value;
  renderOutput(); syncURL();
}
function updateSubPanelDoor(pid, spid, did, field, value) {
  const panel = panels.find(p => p.id === pid);
  if (!panel) return;
  const sp = (panel.subpanels||[]).find(s => s.id === spid);
  if (!sp) return;
  const d = (sp.doors||[]).find(d => d.id === did);
  if (d) d[field] = value;
  // update panel-level progress chips + bar
  const chips = document.querySelector(`#panel_${pid} .panel-progress`);
  if (chips) chips.innerHTML = panelProgressChips(panel);
  const bar = document.querySelector(`#panel_${pid} .status-bar-wrap`);
  if (bar) bar.outerHTML = statusBarHTML(panel);
  renderOutput(); syncURL();
}

function updateIOBoard(pid, ioid, field, value) {
  const panel = panels.find(p => p.id === pid);
  if (!panel) return;
  const io = (panel.ioboards||[]).find(b => b.id === ioid);
  if (io) io[field] = value;
  renderOutput(); syncURL();
}
function updatePoint(pid, ioid, ptid, field, value) {
  const panel = panels.find(p => p.id === pid);
  if (!panel) return;
  const io = (panel.ioboards||[]).find(b => b.id === ioid);
  if (!io) return;
  const pt = (io.points||[]).find(p => p.id === ptid);
  if (pt) {
    pt[field] = value;
    if (field === 'kind') { pt.type = ''; renderAll(); return; } // kind change updates type dropdown
  }
  renderOutput(); syncURL(); // text fields — skip re-render so focus is preserved
}

// ── Serialization ─────────────────────────────────────────────────────────
function getProjectFields() {
  return {
    job_number:  document.getElementById('projJob').value     || '',
    name:        document.getElementById('projName').value    || 'Untitled Project',
    site:        document.getElementById('projSite').value    || '',
    platform:    document.getElementById('projPlatform').value|| '',
    technician:  document.getElementById('projTech').value    || '',
    contact:     document.getElementById('projContact').value || '',
    phone:       document.getElementById('projPhone').value   || '',
    date:        document.getElementById('projDate').value    || today(),
  };
}

function buildData() {
  function serializeDoor(d, i) {
    const obj = {
      name: d.name, number: i + 1, location: d.location, status: d.status || null,
      door_type: d.doorType, lock_type: d.lockType,
      reader_in: d.readerIn ? { type: d.readerIn, address: d.readerInAddr } : null,
      rex: d.rex, door_position_switch: d.dps || null, rte_relay: d.rte || null, notes: d.notes
    };
    if (!obj.reader_in) delete obj.reader_in;
    Object.keys(obj).forEach(k => { if (obj[k]===''||obj[k]===null) delete obj[k]; });
    return obj;
  }
  return {
    project: { ...getProjectFields(), generated: new Date().toISOString() },
    panels: panels.map(p => {
      const obj = {
        name: p.name, location: p.location, model: p.model,
        network: { ip: p.ip, mask: p.mask, gateway: p.gateway, dns1: p.dns1, dns2: p.dns2, vlan: p.network },
        notes: p.notes,
        doors: (p.doors||[]).map(serializeDoor),
        sub_panels: (p.subpanels||[]).map(sp => ({
          name: sp.name, model: sp.model, location: sp.location,
          address: sp.address !== undefined ? sp.address : 0,
          notes: sp.notes,
          doors: (sp.doors||[]).map(serializeDoor)
        }))
      };
      obj.io_boards = (p.ioboards||[]).map(io => ({
        name: io.name, model: io.model, location: io.location,
        address: io.address, notes: io.notes,
        points: (io.points||[]).map(pt => {
          const o = { number:pt.ptNum||'', label:pt.label, kind:pt.kind, type:pt.type, function:pt.func, notes:pt.notes };
          Object.keys(o).forEach(k => { if (o[k]===''||o[k]===null||o[k]===undefined) delete o[k]; });
          return o;
        })
      }));
      if (!obj.doors.length)      delete obj.doors;
      if (!obj.sub_panels.length) delete obj.sub_panels;
      if (!obj.io_boards.length)  delete obj.io_boards;
      return obj;
    })
  };
}

// ── YAML serializer ───────────────────────────────────────────────────────
function toYAML(data) {
  function indent(n) { return '  '.repeat(n); }
  function scalar(v) {
    if (typeof v === 'boolean') return v ? 'true' : 'false';
    if (typeof v === 'number')  return String(v);
    if (v === null || v === undefined) return 'null';
    if (typeof v === 'string') {
      if (v === '') return '""';
      if (/[:#\[\]{},|>&*!%@`'"\n]/.test(v) || v.trim() !== v) return JSON.stringify(v);
      return v;
    }
    return JSON.stringify(v);
  }
  function renderObj(obj, level) {
    let out = '';
    for (const [k, v] of Object.entries(obj)) {
      if (v === undefined || v === null || v === '') continue;
      if (Array.isArray(v))           { out += indent(level)+k+':\n'; out += renderArr(v, level+1); }
      else if (typeof v === 'object') { out += indent(level)+k+':\n'; out += renderObj(v, level+1); }
      else                            { out += indent(level)+k+': '+scalar(v)+'\n'; }
    }
    return out;
  }
  function renderArr(arr, level) {
    let out = '';
    for (const item of arr) {
      if (Array.isArray(item)) { out += indent(level)+'-\n'; out += renderArr(item, level+1); continue; }
      if (typeof item === 'object' && item !== null) {
        const entries = Object.entries(item).filter(([,v]) => v!==undefined && v!==null && v!=='');
        if (!entries.length) { out += indent(level)+'- {}\n'; continue; }
        const [fk, fv] = entries[0];
        if (Array.isArray(fv))                      { out += indent(level)+'- '+fk+':\n'; out += renderArr(fv, level+2); }
        else if (typeof fv==='object' && fv!==null) { out += indent(level)+'- '+fk+':\n'; out += renderObj(fv, level+2); }
        else                                        { out += indent(level)+'- '+fk+': '+scalar(fv)+'\n'; }
        for (let i=1; i<entries.length; i++) {
          const [k,v] = entries[i];
          if (Array.isArray(v))                     { out += indent(level+1)+k+':\n'; out += renderArr(v, level+2); }
          else if (typeof v==='object' && v!==null) { out += indent(level+1)+k+':\n'; out += renderObj(v, level+2); }
          else                                      { out += indent(level+1)+k+': '+scalar(v)+'\n'; }
        }
      } else { out += indent(level)+'- '+scalar(item)+'\n'; }
    }
    return out;
  }
  return '# ReaderPro Export\n---\n' + renderObj(data, 0);
}

// ── Output rendering ──────────────────────────────────────────────────────
function renderOutput() {
  const body = document.getElementById('output-body');
  if (!panels.length) {
    body.innerHTML = `<div class="empty-state"><div class="big" style="color:var(--muted)">${IC.shield}</div><div>Add a panel and some doors to see output</div></div>`;
    return;
  }
  const data = buildData();
  const content = activeTab==='yaml' ? toYAML(data) : JSON.stringify(data, null, 2);
  body.innerHTML = `<pre id="output-pre">${escHtml(content)}</pre>`;
}
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-yaml').classList.toggle('active', tab==='yaml');
  document.getElementById('tab-json').classList.toggle('active', tab==='json');
  renderOutput();
}

// ── Export ────────────────────────────────────────────────────────────────
function safeName() {
  return (document.getElementById('projJob').value || document.getElementById('projName').value || 'readerpro').replace(/[^a-z0-9]/gi,'_').toLowerCase();
}
function download(content, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content],{type:mime}));
  a.download = filename; a.click();
}
function exportYAML()  { download(toYAML(buildData()), safeName()+'_doors.yaml', 'text/yaml'); toast('YAML exported!'); }
function exportJSON()  { download(JSON.stringify(buildData(),null,2), safeName()+'_doors.json', 'application/json'); toast('JSON exported!'); }

// ── Excel Export ──────────────────────────────────────────────────────────
function exportExcel() {
  if (!panels.length) { toast('Add at least one panel first'); return; }
  const wb = XLSX.utils.book_new();
  const proj = getProjectFields();

  // Sheet 1: Project Info
  const projRows = [
    ['ReaderPro.io — Door Programming Schedule'],
    [],
    ['Job #',         proj.job_number  || ''],
    ['Project Name',  proj.name        || ''],
    ['Site',          proj.site        || ''],
    ['Platform',      proj.platform    || ''],
    ['Technician',    proj.technician  || ''],
    ['Contact',       proj.contact     || ''],
    ['Phone',         proj.phone       || ''],
    ['Date',          proj.date        || ''],
    ['Generated',     new Date().toLocaleString()],
  ];
  const wsProj = XLSX.utils.aoa_to_sheet(projRows);
  wsProj['!cols'] = [{ wch: 18 }, { wch: 40 }];
  XLSX.utils.book_append_sheet(wb, wsProj, 'Project Info');

  // One sheet per panel — includes direct doors, sub-panel doors, and I/O board points
  const DOOR_H = ['#','Status','Door Name','Zone / Floor','Door Type','Lock Type','Reader IN','Reader Addr','REX','DPS','RTE','Notes'];
  const IO_H   = ['Pt #','Kind','Label','Type','Function / Use','Notes'];

  function doorRow(d, i) {
    return [i+1, d.status||'', d.name||'', d.location||'', d.doorType||'', d.lockType||'',
            d.readerIn||'', d.readerInAddr||'', d.rex||'', d.dps||'', d.rte||'', d.notes||''];
  }

  panels.forEach((p, pi) => {
    const hasSubs = (p.subpanels||[]).length > 0;
    const hasIO   = (p.ioboards||[]).length  > 0;
    let rows = [
      [`Panel: ${p.name || 'Panel '+(pi+1)}`],
      p.ip ? [`IP: ${p.ip}  |  Mask: ${p.mask||''}  |  GW: ${p.gateway||''}  |  VLAN: ${p.network||''}`] : [],
      [],
    ];

    // Direct / onboard connections
    if ((p.doors||[]).length || (!hasSubs && !hasIO)) {
      if (hasSubs || hasIO) rows.push(['── Onboard / Direct Connections ──']);
      rows.push(DOOR_H);
      if ((p.doors||[]).length) (p.doors||[]).forEach((d,i) => rows.push(doorRow(d,i)));
      else rows.push(['(none)']);
    }

    // Sub-panel sections
    (p.subpanels||[]).forEach((sp, spi) => {
      rows.push([], [`── Sub-Panel: ${sp.name||'Sub-Panel '+(spi+1)}${sp.model?' · '+sp.model:''}${sp.location?' · '+sp.location:''}`]);
      rows.push(DOOR_H);
      if ((sp.doors||[]).length) (sp.doors||[]).forEach((d,i) => rows.push(doorRow(d,i)));
      else rows.push(['(none)']);
    });

    // I/O board sections
    (p.ioboards||[]).forEach((io, ioi) => {
      rows.push([], [`── I/O Board: ${io.name||'I/O Board '+(ioi+1)}${io.model?' · '+io.model:''}${io.location?' · '+io.location:''}${io.address?' · Addr: '+io.address:''}`]);
      rows.push(IO_H);
      if ((io.points||[]).length) (io.points||[]).forEach((pt,i) => rows.push([pt.ptNum||i+1, pt.kind||'', pt.label||'', pt.type||'', pt.func||'', pt.notes||'']));
      else rows.push(['(none)']);
    });

    rows = rows.filter(r => r.length > 0);
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [6,14,24,16,14,18,18,12,12,12,12,24].map(w=>({wch:w}));

    // Bold all header rows (door headers start with '#', IO headers start with 'Pt #')
    rows.forEach((row, ri) => {
      if (row[0]==='#' || row[0]==='Pt #') {
        row.forEach((_, ci) => {
          const ref = XLSX.utils.encode_cell({r:ri, c:ci});
          if (ws[ref]) ws[ref].s = { font:{bold:true}, fill:{fgColor:{rgb:'E2E8F0'}} };
        });
      }
    });

    const sheetName = (p.name || 'Panel '+(pi+1)).replace(/[\\/*?[\]:]/g,'').slice(0,31);
    XLSX.utils.book_append_sheet(wb, ws, sheetName || `Panel ${pi+1}`);
  });

  XLSX.writeFile(wb, safeName()+'_doors.xlsx');
  toast('📊 Excel exported!');
}

// ── Import ────────────────────────────────────────────────────────────────
function importFile() { document.getElementById('file-import').click(); }
function handleImport(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = file.name.endsWith('.json') ? JSON.parse(ev.target.result) : jsyaml.load(ev.target.result);
      loadData(data); toast('Imported!');
    } catch(err) { alert('Could not parse file: '+err.message); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function loadData(data) {
  const proj = data.project || {};
  document.getElementById('projJob').value     = proj.job_number || '';
  document.getElementById('projName').value    = proj.name       || '';
  document.getElementById('projSite').value    = proj.site       || '';
  document.getElementById('projTech').value    = proj.technician || proj.engineer || '';
  document.getElementById('projContact').value = proj.contact    || '';
  document.getElementById('projPhone').value   = proj.phone      || '';
  document.getElementById('projDate').value    = proj.date       || '';
  const sel = document.getElementById('projPlatform');
  if (proj.platform) { for (let o of sel.options) { if (o.value===proj.platform){sel.value=proj.platform;break;} } }

  function deserializeDoor(d) {
    return {
      id: genId(), name: d.name||'', location: d.location||'',
      doorType: d.door_type||'', lockType: d.lock_type||'',
      readerIn:     d.reader_in ? (d.reader_in.type    ||'') : '',
      readerInAddr: d.reader_in ? (d.reader_in.address ||'') : '',
      rex:    d.rex    || 'Motion',
      dps:    d.door_position_switch || (d.door_sensor ? 'Standard' : '') || '',
      rte:    d.rte_relay || '',
      status: d.status || '',
      notes:  d.notes  || ''
    };
  }
  panels = (data.panels||[]).map(p => ({
    id: genId(), name: p.name||'', location: p.location||'', model: p.model||'',
    ip:      (p.network?.ip      || p.ip      || ''),
    mask:    (p.network?.mask    || p.mask    || ''),
    gateway: (p.network?.gateway || p.gateway || ''),
    dns1:    (p.network?.dns1    || p.dns1    || ''),
    dns2:    (p.network?.dns2    || p.dns2    || ''),
    network: (p.network?.vlan    || (typeof p.network==='string' ? p.network : '') || ''),
    notes: p.notes||'',
    doors: (p.doors||[]).map(deserializeDoor),
    subpanels: (p.sub_panels||[]).map((sp, spi) => ({
      id: genId(), name: sp.name||'Sub-Panel '+spi, model: sp.model||'',
      location: sp.location||'', address: sp.address !== undefined ? sp.address : spi,
      notes: sp.notes||'',
      doors: (sp.doors||[]).map(deserializeDoor)
    })),
    ioboards: (p.io_boards||[]).map((io, ioi) => ({
      id: genId(), name: io.name||'I/O Board '+(ioi+1), model: io.model||'',
      location: io.location||'', address: io.address||'', notes: io.notes||'',
      points: (io.points||[]).map((pt, pti) => ({
        id: genId(), ptNum: pt.number||pti+1, label: pt.label||'',
        kind: pt.kind||'', type: pt.type||'', func: pt.function||'', notes: pt.notes||''
      }))
    }))
  }));
  renderAll();
}

// ── Share via URL ─────────────────────────────────────────────────────────
function syncURL() {
  if (!panels.length) { history.replaceState(null,'',window.location.pathname); return; }
  try {
    const compressed = LZString.compressToEncodedURIComponent(JSON.stringify({ project: getProjectFields(), panels }));
    history.replaceState(null, '', '#' + compressed);
  } catch(e) {}
}
function shareURL() {
  try {
    const compressed = LZString.compressToEncodedURIComponent(JSON.stringify({ project: getProjectFields(), panels }));
    const url = window.location.origin + window.location.pathname + '#' + compressed;
    navigator.clipboard.writeText(url).then(() => toast('🔗 Link copied!'));
  } catch(e) { toast('Could not copy link'); }
}
function loadFromURL() {
  const hash = window.location.hash.slice(1); if (!hash) return;
  try {
    const json = LZString.decompressFromEncodedURIComponent(hash); if (!json) return;
    const state = JSON.parse(json);
    const proj = state.project || {};
    document.getElementById('projJob').value     = proj.job_number || '';
    document.getElementById('projName').value    = proj.name       || '';
    document.getElementById('projSite').value    = proj.site       || '';
    document.getElementById('projTech').value    = proj.technician || '';
    document.getElementById('projContact').value = proj.contact    || '';
    document.getElementById('projPhone').value   = proj.phone      || '';
    document.getElementById('projDate').value    = proj.date       || '';
    const sel = document.getElementById('projPlatform');
    if (proj.platform) { for (let o of sel.options) { if (o.value===proj.platform){sel.value=proj.platform;break;} } }
    panels = (state.panels||[]).map(p => ({
      ...p, id: p.id||genId(),
      doors: (p.doors||[]).map(d=>({...d, id:d.id||genId()})),
      subpanels: (p.subpanels||[]).map(sp=>({
        ...sp, id: sp.id||genId(),
        doors: (sp.doors||[]).map(d=>({...d, id:d.id||genId()}))
      })),
      ioboards: (p.ioboards||[]).map(io=>({
        ...io, id: io.id||genId(),
        points: (io.points||[]).map(pt=>({...pt, id:pt.id||genId()}))
      }))
    }));
    renderAll(); toast('Project loaded from link!');
  } catch(e) { console.warn('Could not load from URL:', e); }
}

// ── BOM ───────────────────────────────────────────────────────────────────
function tally(items) {
  const map = {};
  items.forEach(v => { if (v) map[v] = (map[v]||0)+1; });
  return Object.entries(map).sort((a,b)=>b[1]-a[1]);
}
function showBOM() {
  const allDoors       = panels.flatMap(p => panelAllDoors(p));
  const totalSubPanels = panels.reduce((s,p) => s + (p.subpanels||[]).length, 0);
  const allIOBoards    = panels.flatMap(p => p.ioboards||[]);
  const allPoints      = allIOBoards.flatMap(io => io.points||[]);
  const totalInputs    = allPoints.filter(pt => pt.kind === 'Input').length;
  const totalOutputs   = allPoints.filter(pt => pt.kind === 'Output').length;
  const ptFunctions    = tally(allPoints.map(pt => pt.func).filter(Boolean));
  const total = allDoors.length;
  const readers   = tally(allDoors.map(d=>d.readerIn).filter(Boolean));
  const locks     = tally(allDoors.map(d=>d.lockType).filter(Boolean));
  const types     = tally(allDoors.map(d=>d.doorType).filter(Boolean));
  const rexTypes  = tally(allDoors.map(d=>d.rex).filter(Boolean));
  const statuses  = tally(allDoors.map(d=>d.status).filter(Boolean));
  const dpsTypes  = tally(allDoors.map(d=>d.dps).filter(Boolean));
  const rteTypes  = tally(allDoors.map(d=>d.rte).filter(Boolean));

  function bomTable(rows, maxVal) {
    if (!rows.length) return '<p style="color:var(--muted);font-size:12px;">None specified</p>';
    return `<table class="bom-table">${rows.map(([label,count])=>`
      <tr><td>${label}</td><td><div class="bom-bar-wrap"><div class="bom-bar"><div class="bom-bar-fill" style="width:${Math.round(count/maxVal*100)}%"></div></div></div></td><td>${count}</td></tr>`).join('')}</table>`;
  }
  const SC = { Designed:'#7eb4ff', Programmed:'#fbbf24', Tested:'#fb923c', Commissioned:'#4ade80' };
  function statusTable(rows) {
    if (!rows.length) return '<p style="color:var(--muted);font-size:12px;">No status set yet</p>';
    return `<table class="bom-table">${rows.map(([l,n])=>`<tr><td style="color:${SC[l]||'inherit'};font-weight:700;">${l}</td><td></td><td>${n}</td></tr>`).join('')}</table>`;
  }
  const maxR = Math.max(...readers.map(r=>r[1]), 1);
  const maxL = Math.max(...locks.map(r=>r[1]),   1);

  document.getElementById('bom-body').innerHTML = `
    <div class="bom-stats">
      <div class="bom-stat"><div class="num">${panels.length}</div><div class="lbl">Controllers</div></div>
      ${totalSubPanels ? `<div class="bom-stat"><div class="num">${totalSubPanels}</div><div class="lbl">Sub-Panels</div></div>` : ''}
      ${allIOBoards.length ? `<div class="bom-stat"><div class="num">${allIOBoards.length}</div><div class="lbl">I/O Boards</div></div>` : ''}
      ${allPoints.length ? `<div class="bom-stat"><div class="num" style="color:#34d399;">${totalInputs}</div><div class="lbl">Inputs</div></div>` : ''}
      ${allPoints.length ? `<div class="bom-stat"><div class="num" style="color:#fb923c;">${totalOutputs}</div><div class="lbl">Outputs</div></div>` : ''}
      <div class="bom-stat"><div class="num">${total}</div><div class="lbl">Total Doors</div></div>
      <div class="bom-stat"><div class="num">${readers.reduce((s,[,n])=>s+n,0)}</div><div class="lbl">Readers</div></div>
      <div class="bom-stat"><div class="num">${allDoors.filter(d=>d.dps).length}</div><div class="lbl">DPS</div></div>
      <div class="bom-stat"><div class="num">${allDoors.filter(d=>d.dps==='Supervised').length}</div><div class="lbl">DPS Supervised</div></div>
      <div class="bom-stat"><div class="num">${allDoors.filter(d=>d.rte).length}</div><div class="lbl">RTE</div></div>
    </div>
    <div class="bom-section"><h3>Reader Types</h3>${bomTable(readers, maxR)}</div>
    <div class="bom-section"><h3>Lock Types</h3>${bomTable(locks, maxL)}</div>
    <div class="bom-section"><h3>Door Types</h3>${bomTable(types, Math.max(...types.map(r=>r[1]),1))}</div>
    <div class="bom-section"><h3>REX Types</h3>${bomTable(rexTypes, Math.max(...rexTypes.map(r=>r[1]),1))}</div>
    <div class="bom-section"><h3>Door Position Switch</h3>${bomTable(dpsTypes, Math.max(...dpsTypes.map(r=>r[1]),1))}</div>
    <div class="bom-section"><h3>RTE</h3>${bomTable(rteTypes, Math.max(...rteTypes.map(r=>r[1]),1))}</div>
    ${allPoints.length ? `<div class="bom-section"><h3>I/O Point Functions</h3>${ptFunctions.length ? bomTable(ptFunctions, Math.max(...ptFunctions.map(r=>r[1]),1)) : '<p style="color:var(--muted);font-size:12px;">None specified</p>'}</div>` : ''}
    <div class="bom-section"><h3>Commissioning Status</h3>${statusTable(statuses)}
      ${total ? `<p style="margin-top:8px;font-size:12px;color:var(--muted);">${total-statuses.reduce((s,[,n])=>s+n,0)} door${total-statuses.reduce((s,[,n])=>s+n,0)!==1?'s':''} with no status set</p>` : ''}
    </div>`;
  document.getElementById('bom-modal').classList.remove('hidden');
}
function closeBOM() { document.getElementById('bom-modal').classList.add('hidden'); }
function closeBOMOnOverlay(e) { if (e.target===document.getElementById('bom-modal')) closeBOM(); }

// ── Print View ────────────────────────────────────────────────────────────
function printView() {
  if (!panels.length) { toast('Add at least one panel first'); return; }
  const proj = getProjectFields();
  const SC = { Designed:'#1d4ed8', Programmed:'#b45309', Tested:'#c2410c', Commissioned:'#15803d' };

  function e(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function doorTableHTML(doors, indent) {
    if (!doors.length) return '<p style="color:#94a3b8;font-style:italic;font-size:9px;padding:4px 0 8px 4px;">No doors configured</p>';
    const ml = indent ? 'margin-left:14px;' : '';
    return `<table style="${ml}"><thead><tr>
      <th style="width:26px;">#</th><th>Status</th><th>Door Name</th><th>Zone/Floor</th>
      <th>Type</th><th>Lock</th><th>Reader IN</th><th>Addr</th>
      <th>REX</th><th>DPS</th><th>RTE</th><th>Notes</th>
    </tr></thead><tbody>${doors.map((d,i) => {
      const sc = SC[d.status] ? `color:${SC[d.status]};font-weight:700;` : 'color:#64748b;';
      return `<tr style="${i%2===1?'background:#f8fafc;':''}">
        <td style="text-align:center;color:#94a3b8;font-weight:700;">${i+1}</td>
        <td style="${sc}">${e(d.status)||'—'}</td>
        <td style="font-weight:500;">${e(d.name)||'—'}</td>
        <td>${e(d.location)||''}</td><td>${e(d.doorType)||''}</td><td>${e(d.lockType)||''}</td>
        <td>${e(d.readerIn)||''}</td><td>${e(d.readerInAddr)||''}</td>
        <td>${e(d.rex)||''}</td><td>${e(d.dps)||''}</td><td>${e(d.rte)||''}</td>
        <td style="color:#64748b;">${e(d.notes)||''}</td>
      </tr>`;
    }).join('')}</tbody></table>`;
  }

  function ioTableHTML(points) {
    if (!points.length) return '';
    return `<table style="margin-left:14px;"><thead><tr>
      <th style="width:38px;">Pt #</th><th>Kind</th><th>Label</th><th>Type</th><th>Function / Use</th><th>Notes</th>
    </tr></thead><tbody>${points.map((pt,i) => {
      const kc = pt.kind==='Input' ? 'color:#065f46;font-weight:700;' : pt.kind==='Output' ? 'color:#c2410c;font-weight:700;' : '';
      return `<tr style="${i%2===1?'background:#f0fdf4;':''}">
        <td style="text-align:center;color:#94a3b8;font-weight:700;">${e(String(pt.ptNum||i+1))}</td>
        <td style="${kc}">${e(pt.kind)||'—'}</td>
        <td style="font-weight:500;">${e(pt.label)||''}</td>
        <td>${e(pt.type)||''}</td><td>${e(pt.func)||''}</td>
        <td style="color:#64748b;">${e(pt.notes)||''}</td>
      </tr>`;
    }).join('')}</tbody></table>`;
  }

  function sectionLabel(text, color, bg, border) {
    return `<div style="font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;
      color:${color};background:${bg};border-left:3px solid ${border};
      padding:4px 10px;margin:10px 0 4px;">${text}</div>`;
  }

  const panelsHTML = panels.map(p => {
    const meta = [p.model, p.ip&&'IP: '+p.ip, p.location].filter(Boolean).join(' · ');
    const hasDirect = (p.doors||[]).length > 0;
    const hasSubs   = (p.subpanels||[]).length > 0;
    const allDoors  = panelAllDoors(p);
    const ioboards  = p.ioboards||[];
    let body = '';
    if (!allDoors.length && !ioboards.length) {
      body = '<p style="color:#94a3b8;font-style:italic;padding:8px 4px;font-size:9px;">No doors or I/O boards configured</p>';
    } else {
      if (hasDirect) {
        if (hasSubs) body += sectionLabel('Onboard Connections','#475569','#f8fafc','#94a3b8');
        body += doorTableHTML(p.doors, false);
      }
      (p.subpanels||[]).forEach(sp => {
        if (!(sp.doors||[]).length) return;
        const lbl = e((sp.name||'Sub-Panel') + (sp.address!==''&&sp.address!=null?' · Addr '+sp.address:'') + (sp.model?' · '+sp.model:''));
        body += sectionLabel(lbl,'#1d4ed8','#eff6ff','#3b82f6');
        body += doorTableHTML(sp.doors, true);
      });
      ioboards.forEach(io => {
        if (!(io.points||[]).length) return;
        const lbl = e((io.name||'I/O Board') + (io.address!==''&&io.address!=null?' · Addr '+io.address:'') + (io.model?' · '+io.model:''));
        body += sectionLabel(lbl,'#065f46','#ecfdf5','#10b981');
        body += ioTableHTML(io.points||[]);
      });
    }
    return `<div class="panel-section">
      <div class="ph"><span style="font-size:13px;font-weight:800;">${e(p.name||'Unnamed Panel')}</span>
        ${meta?`<span style="margin-left:14px;font-size:10px;opacity:0.75;">${e(meta)}</span>`:''}
        ${p.notes?`<span style="margin-left:14px;font-size:9px;opacity:0.6;font-style:italic;">${e(p.notes)}</span>`:''}
      </div><div class="pb">${body}</div></div>`;
  }).join('');

  const projF = [
    proj.job_number&&['Job #',proj.job_number], proj.name&&['Project',proj.name],
    proj.site&&['Site',proj.site], proj.platform&&['Platform',proj.platform],
    proj.technician&&['Technician',proj.technician],
    proj.contact&&['Contact',proj.contact+(proj.phone?' · '+proj.phone:'')],
    proj.date&&['Date',proj.date],
  ].filter(Boolean);

  const html = `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<title>ReaderPro.io${proj.name?' — '+proj.name:''}</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:Arial,Helvetica,sans-serif;font-size:10px;color:#111;background:#fff;padding:14px 18px;}
  .dh{display:flex;align-items:baseline;gap:10px;border-bottom:2.5px solid #1a56db;padding-bottom:8px;margin-bottom:12px;}
  .dh-logo{font-size:16px;font-weight:900;color:#1a56db;letter-spacing:-0.5px;}
  .dh-sub{font-size:11px;color:#64748b;}
  .proj{display:flex;flex-wrap:wrap;gap:6px 22px;background:#f1f5f9;border:1px solid #cbd5e1;border-radius:5px;padding:7px 12px;margin-bottom:14px;}
  .pf-l{font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#64748b;}
  .pf-v{font-size:11px;font-weight:600;color:#111;}
  .panel-section{border:1px solid #94a3b8;border-radius:5px;margin-bottom:14px;overflow:hidden;page-break-inside:avoid;}
  .ph{background:#1e3a8a;color:#fff;padding:7px 12px;display:flex;align-items:center;flex-wrap:wrap;}
  .pb{padding:8px 12px;}
  table{width:100%;border-collapse:collapse;margin-bottom:4px;font-size:9px;}
  th{background:#f1f5f9;color:#475569;font-weight:700;font-size:7.5px;text-transform:uppercase;letter-spacing:0.04em;padding:3.5px 5px;border:1px solid #cbd5e1;text-align:left;}
  td{padding:2.5px 5px;border:1px solid #e2e8f0;vertical-align:middle;word-break:break-word;}
  .ft{text-align:center;margin-top:16px;font-size:8.5px;color:#94a3b8;border-top:1px solid #e2e8f0;padding-top:8px;}
  @media print{@page{margin:10mm 8mm;size:landscape;}body{padding:0;}.panel-section{page-break-inside:avoid;}}
</style></head><body>
<div class="dh"><span class="dh-logo">ReaderPro.io</span><span class="dh-sub">/ Door Programming Schedule</span></div>
${projF.length?`<div class="proj">${projF.map(([l,v])=>`<div><div class="pf-l">${e(l)}</div><div class="pf-v">${e(String(v))}</div></div>`).join('')}</div>`:''}
${panelsHTML}
<div class="ft">Generated by ReaderPro.io &nbsp;·&nbsp; ${new Date().toLocaleString()}</div>
<script>window.onload=()=>setTimeout(()=>window.print(),300);<\/script>
</body></html>`;

  const w = window.open('', '_blank');
  if (!w) { toast('⚠️ Allow popups to use Print / PDF'); return; }
  w.document.write(html);
  w.document.close();
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
